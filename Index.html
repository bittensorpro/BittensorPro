<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bittensor Pro — Próximamente</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600;700&family=Major+Mono+Display&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #05060a;
    --bg-1: #0a0d18;
    --neon-cyan: #00f0ff;
    --neon-magenta: #ff2bd6;
    --neon-violet: #8a2bff;
    --neon-amber: #ffb648;
    --grid: rgba(0, 240, 255, 0.08);
    --grid-strong: rgba(0, 240, 255, 0.18);
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
height: 100%;
overflow: hidden;
background: var(–bg-0);
color: #e8f6ff;
font-family: ‘Chakra Petch’, sans-serif;
cursor: crosshair;
}

/* === Capa de fondo: gradiente radial + viñeta === */
.bg {
position: fixed; inset: 0;
background:
radial-gradient(1200px 700px at 70% -10%, rgba(138, 43, 255, 0.35), transparent 60%),
radial-gradient(900px 600px at 10% 110%, rgba(255, 43, 214, 0.25), transparent 60%),
radial-gradient(700px 500px at 50% 50%, rgba(0, 240, 255, 0.10), transparent 70%),
linear-gradient(180deg, #02030a 0%, #07091a 50%, #02030a 100%);
z-index: 0;
}

/* === Cuadrícula de perspectiva (piso cyberpunk) === */
.floor {
position: fixed;
bottom: -10vh;
left: 50%;
width: 220vw;
height: 70vh;
transform: translateX(-50%) perspective(600px) rotateX(60deg);
background-image:
linear-gradient(var(–grid-strong) 1px, transparent 1px),
linear-gradient(90deg, var(–grid-strong) 1px, transparent 1px);
background-size: 60px 60px;
animation: floor-scroll 6s linear infinite;
mask-image: linear-gradient(to top, rgba(0,0,0,0.95) 20%, transparent 100%);
z-index: 1;
opacity: 0.85;
}

@keyframes floor-scroll {
from { background-position: 0 0; }
to   { background-position: 0 60px; }
}

/* === Cuadrícula cenital (techo) === */
.ceiling {
position: fixed;
top: -10vh;
left: 50%;
width: 220vw;
height: 50vh;
transform: translateX(-50%) perspective(600px) rotateX(-60deg);
background-image:
linear-gradient(var(–grid) 1px, transparent 1px),
linear-gradient(90deg, var(–grid) 1px, transparent 1px);
background-size: 80px 80px;
mask-image: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
z-index: 1;
}

/* === Sol/luna neon detrás del título === */
.sun {
position: fixed;
top: 28%;
left: 50%;
width: 520px;
height: 520px;
transform: translate(-50%, -50%);
border-radius: 50%;
background:
radial-gradient(circle at 50% 50%, rgba(255, 43, 214, 0.0) 50%, rgba(255, 43, 214, 0.35) 51%, transparent 60%),
radial-gradient(circle at 50% 50%, rgba(255, 182, 72, 0.6), rgba(255, 43, 214, 0.4) 60%, transparent 75%);
filter: blur(2px);
z-index: 1;
box-shadow:
0 0 80px rgba(255, 43, 214, 0.4),
0 0 200px rgba(138, 43, 255, 0.3);
animation: sun-pulse 4s ease-in-out infinite;
}

/* Líneas horizontales que cortan el sol */
.sun::before, .sun::after {
content: “”;
position: absolute;
left: 0; right: 0;
height: 6px;
background: var(–bg-0);
}
.sun::before { top: 65%; box-shadow: 0 18px 0 var(–bg-0), 0 36px 0 var(–bg-0), 0 56px 0 var(–bg-0); }
.sun::after  { top: 88%; height: 10px; }

@keyframes sun-pulse {
0%, 100% { transform: translate(-50%, -50%) scale(1); }
50%      { transform: translate(-50%, -50%) scale(1.03); }
}

/* === Scanlines === */
.scanlines {
position: fixed; inset: 0;
background: repeating-linear-gradient(
to bottom,
rgba(255, 255, 255, 0.025) 0px,
rgba(255, 255, 255, 0.025) 1px,
transparent 1px,
transparent 3px
);
pointer-events: none;
z-index: 5;
mix-blend-mode: overlay;
}

/* === Ruido === */
.noise {
position: fixed; inset: 0;
pointer-events: none;
z-index: 6;
opacity: 0.06;
background-image: url(“data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='1'/></svg>”);
}

/* === Contenido === */
.stage {
position: relative;
z-index: 3;
height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 24px;
text-align: center;
}

/* Tag superior */
.tag {
font-family: ‘Share Tech Mono’, monospace;
font-size: 12px;
letter-spacing: 0.4em;
color: var(–neon-cyan);
text-transform: uppercase;
margin-bottom: 28px;
padding: 8px 16px;
border: 1px solid rgba(0, 240, 255, 0.4);
background: rgba(0, 240, 255, 0.05);
backdrop-filter: blur(4px);
animation: flicker 4s infinite, fade-in 1.2s ease-out 0.1s both;
}
.tag .dot {
display: inline-block;
width: 8px; height: 8px;
border-radius: 50%;
background: var(–neon-cyan);
margin-right: 10px;
box-shadow: 0 0 10px var(–neon-cyan);
animation: blink 1.4s ease-in-out infinite;
}

/* τ tau gigante */
.tau {
font-family: ‘Major Mono Display’, monospace;
font-size: clamp(120px, 22vw, 280px);
line-height: 0.85;
color: transparent;
background: linear-gradient(180deg, #fff 0%, var(–neon-cyan) 50%, var(–neon-magenta) 100%);
-webkit-background-clip: text;
background-clip: text;
text-shadow: none;
filter:
drop-shadow(0 0 18px rgba(0, 240, 255, 0.6))
drop-shadow(0 0 40px rgba(255, 43, 214, 0.4));
margin-bottom: 6px;
position: relative;
animation: fade-in 1.4s ease-out 0.3s both, glitch-shift 7s infinite;
}

.tau::before, .tau::after {
content: “τ”;
position: absolute;
top: 0; left: 0;
width: 100%;
background: none;
-webkit-background-clip: initial;
background-clip: initial;
pointer-events: none;
}
.tau::before {
color: var(–neon-cyan);
mix-blend-mode: screen;
transform: translate(-3px, 0);
opacity: 0.55;
animation: glitch-1 3.6s infinite steps(1);
}
.tau::after {
color: var(–neon-magenta);
mix-blend-mode: screen;
transform: translate(3px, 0);
opacity: 0.55;
animation: glitch-2 3.6s infinite steps(1);
}

/* Título */
.title {
font-family: ‘Chakra Petch’, sans-serif;
font-weight: 700;
font-size: clamp(36px, 6vw, 76px);
letter-spacing: 0.12em;
text-transform: uppercase;
color: #f4faff;
margin-top: 8px;
position: relative;
animation: fade-in 1.2s ease-out 0.6s both;
}
.title .pro {
color: var(–neon-magenta);
text-shadow:
0 0 8px rgba(255, 43, 214, 0.8),
0 0 28px rgba(255, 43, 214, 0.5);
font-style: italic;
}

/* Línea separadora */
.line {
width: clamp(160px, 28vw, 320px);
height: 1px;
background: linear-gradient(90deg, transparent, var(–neon-cyan), var(–neon-magenta), transparent);
margin: 26px 0 22px;
animation: fade-in 1.2s ease-out 0.9s both;
}

/* Próximamente */
.soon {
font-family: ‘Share Tech Mono’, monospace;
font-size: clamp(14px, 1.6vw, 18px);
letter-spacing: 0.7em;
color: var(–neon-cyan);
text-transform: uppercase;
padding-left: 0.7em; /* compensar tracking */
animation: fade-in 1.2s ease-out 1.1s both, flicker 5s infinite;
text-shadow: 0 0 12px rgba(0, 240, 255, 0.6);
}
.soon .bracket { color: var(–neon-magenta); margin: 0 10px; }
.soon .cursor {
display: inline-block;
width: 0.55em;
height: 1em;
background: var(–neon-cyan);
margin-left: 4px;
transform: translateY(2px);
animation: blink 1s steps(1) infinite;
box-shadow: 0 0 8px var(–neon-cyan);
}

/* Footer / coordenadas */
.hud {
position: fixed;
bottom: 18px;
left: 0; right: 0;
display: flex;
justify-content: space-between;
padding: 0 20px;
font-family: ‘Share Tech Mono’, monospace;
font-size: 10px;
letter-spacing: 0.2em;
color: rgba(0, 240, 255, 0.6);
z-index: 4;
text-transform: uppercase;
}

.hud-corner {
position: fixed;
width: 28px; height: 28px;
border: 1px solid var(–neon-cyan);
z-index: 4;
opacity: 0.7;
}
.hud-corner.tl { top: 16px; left: 16px; border-right: none; border-bottom: none; }
.hud-corner.tr { top: 16px; right: 16px; border-left: none; border-bottom: none; }
.hud-corner.bl { bottom: 16px; left: 16px; border-right: none; border-top: none; }
.hud-corner.br { bottom: 16px; right: 16px; border-left: none; border-top: none; }

/* === Animaciones === */
@keyframes fade-in {
from { opacity: 0; transform: translateY(12px); }
to   { opacity: 1; transform: translateY(0); }
}

@keyframes blink {
0%, 49% { opacity: 1; }
50%, 100% { opacity: 0.15; }
}

@keyframes flicker {
0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
20%, 24%, 55% { opacity: 0.55; }
}

@keyframes glitch-shift {
0%, 92%, 100% { transform: translate(0, 0); }
93% { transform: translate(-2px, 1px); }
94% { transform: translate(2px, -1px); }
95% { transform: translate(-1px, 2px); }
96% { transform: translate(1px, -2px); }
97% { transform: translate(0, 0); }
}

@keyframes glitch-1 {
0%, 100% { clip-path: inset(0 0 0 0); transform: translate(-3px, 0); }
20%      { clip-path: inset(10% 0 60% 0); transform: translate(-5px, 0); }
40%      { clip-path: inset(45% 0 30% 0); transform: translate(-2px, 0); }
60%      { clip-path: inset(75% 0 5% 0);  transform: translate(-4px, 0); }
80%      { clip-path: inset(20% 0 50% 0); transform: translate(-3px, 0); }
}
@keyframes glitch-2 {
0%, 100% { clip-path: inset(0 0 0 0); transform: translate(3px, 0); }
20%      { clip-path: inset(60% 0 10% 0); transform: translate(5px, 0); }
40%      { clip-path: inset(25% 0 45% 0); transform: translate(2px, 0); }
60%      { clip-path: inset(5% 0 75% 0);  transform: translate(4px, 0); }
80%      { clip-path: inset(50% 0 20% 0); transform: translate(3px, 0); }
}

@media (max-width: 480px) {
.tag { font-size: 10px; letter-spacing: 0.3em; }
.soon { letter-spacing: 0.5em; padding-left: 0.5em; }
.hud { font-size: 9px; }
}
</style>

</head>
<body>

  <div class="bg"></div>
  <div class="ceiling"></div>
  <div class="floor"></div>
  <div class="sun"></div>

  <!-- HUD esquinas -->

  <div class="hud-corner tl"></div>
  <div class="hud-corner tr"></div>
  <div class="hud-corner bl"></div>
  <div class="hud-corner br"></div>

  <main class="stage">
    <div class="tag"><span class="dot"></span>Subnet · 0xPRO · Online</div>

<div class="tau" data-text="τ">τ</div>

<h1 class="title">Bittensor <span class="pro">Pro</span></h1>

<div class="line"></div>

<div class="soon">
  <span class="bracket">[</span>Próximamente<span class="bracket">]</span><span class="cursor"></span>
</div>

  </main>

  <div class="scanlines"></div>
  <div class="noise"></div>

  <div class="hud">
    <span>v0.0.1 · build 2026.04</span>
    <span>// decentralized intelligence</span>
  </div>

</body>
</html>
