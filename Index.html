<style>

- { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
height: 100%;
overflow: hidden;

body { cursor: crosshair; }

/* Fondo */
.bg {
position: fixed; inset: 0;

radial-gradient(800px 500px at 10% 110%, rgba(255, 43, 214, 0.30), transparent 60%),
radial-gradient(600px 400px at 50% 50%, rgba(0, 240, 255, 0.12), transparent 70%),
linear-gradient(180deg, #02030a 0%, #07091a 50%, #02030a 100%);
z-index: 0;
}

/* Sol synthwave */
.sun {
position: fixed;
top: 22%;
left: 50%;
width: min(440px, 80vw);
height: min(440px, 80vw);
transform: translate(-50%, -50%);
border-radius: 50%;
background: radial-gradient(circle at 50% 45%,
rgba(255, 182, 72, 0.7) 0%,
rgba(255, 43, 214, 0.55) 35%,
rgba(138, 43, 255, 0.3) 60%,
transparent 75%);
filter: blur(2px);
z-index: 1;
animation: sun-pulse 4s ease-in-out infinite;
}
.sun::before {
content: “”;
position: absolute;
left: 5%; right: 5%;
top: 60%;
height: 4px;
background: var(–bg-0);
box-shadow:
0 14px 0 var(–bg-0),
0 28px 0 var(–bg-0),
0 44px 0 var(–bg-0),
0 64px 0 var(–bg-0);
border-radius: 2px;
}
@keyframes sun-pulse {
0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.95; }
50%      { transform: translate(-50%, -50%) scale(1.04); opacity: 1; }
}

/* Cuadrícula del piso */
.floor {
position: fixed;
bottom: 0;
left: 50%;
width: 300vw;
height: 60vh;
transform: translateX(-50%) perspective(500px) rotateX(65deg);
transform-origin: center top;
background-image:
linear-gradient(var(–grid-strong) 2px, transparent 2px),
linear-gradient(90deg, var(–grid-strong) 2px, transparent 2px);
background-size: 50px 50px;
animation: floor-scroll 4s linear infinite;
mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.9) 30%, rgba(0,0,0,1) 70%);
-webkit-mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.9) 30%, rgba(0,0,0,1) 70%);
z-index: 1;
}
@keyframes floor-scroll {
from { background-position: 0 0; }
to   { background-position: 0 50px; }
}

/* Scanlines */
.scanlines {
position: fixed; inset: 0;
background: repeating-linear-gradient(
to bottom,
rgba(255, 255, 255, 0.04) 0px,
rgba(255, 255, 255, 0.04) 1px,
transparent 1px,
transparent 3px
);
pointer-events: none;
z-index: 5;

.noise {

      if(j && j.data && j.data[0]){
        const price = parseFloat(j.data[0].price) || 0;
        const change = parseFloat(j.data[0].percent_change_24h) || 0;
        document.getElementById('tao-float-price').textContent = fmtUSD(price);
        const changeEl = document.getElementById('tao-float-change');
        changeEl.textContent = fmtPct(change);
        changeEl.className = 'tao-float-change ' + pctClass(change);
      }
    }catch(e){
      // Fallar silenciosamente — el botón sigue siendo clicable
      console.error('TAO price load failed', e);
    }
  })();
  </script>

<script>
// Guardar esta página en sessionStorage para el botón "Volver" inteligente
(function(){
  function savePage(){
    try {
      const here = window.location.pathname.split('/').pop() || 'index.html';
      sessionStorage.setItem('lastPage', here);
    } catch(e){}
  }
  window.addEventListener('beforeunload', savePage);
  document.addEventListener('visibilitychange', function(){
    if(document.visibilityState === 'hidden') savePage();
  });
  // También guardar cuando hacen click en cualquier link interno
  document.addEventListener('click', function(e){
    const a = e.target.closest('a[href]');
    if(a && a.getAttribute('href') && !a.getAttribute('href').startsWith('http')){
      savePage();
    }
  }, true);
})();
</script>
