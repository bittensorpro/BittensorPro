<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bittensor Pro — Próximamente</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600;700&family=Share+Tech+Mono&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #05060a;
    --neon-cyan: #00f0ff;
    --neon-magenta: #ff2bd6;
    --neon-violet: #8a2bff;
    --neon-amber: #ffb648;
    --grid: rgba(0, 240, 255, 0.20);
    --grid-strong: rgba(0, 240, 255, 0.35);
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
height: 100%;
overflow: hidden;
background: var(–bg-0);
color: #e8f6ff;
font-family: ‘Chakra Petch’, sans-serif;
}

body { cursor: crosshair; }

/* === Fondo base con gradientes === */
.bg {
position: fixed; inset: 0;
background:
radial-gradient(1000px 600px at 70% -10%, rgba(138, 43, 255, 0.45), transparent 60%),
radial-gradient(800px 500px at 10% 110%, rgba(255, 43, 214, 0.30), transparent 60%),
radial-gradient(600px 400px at 50% 50%, rgba(0, 240, 255, 0.12), transparent 70%),
linear-gradient(180deg, #02030a 0%, #07091a 50%, #02030a 100%);
z-index: 0;
}

/* === Sol synthwave === */
.sun {
position: fixed;
top: 22%;
left: 50%;
width: min(440px, 80vw);
height: min(440px, 80vw);
transform: translate(-50%, -50%);
border-radius: 50%;
background: radial-gradient(circle at 50% 45%,
rgba(255, 182, 72, 0.7) 0%,
rgba(255, 43, 214, 0.55) 35%,
rgba(138, 43, 255, 0.3) 60%,
transparent 75%);
filter: blur(2px);
z-index: 1;
animation: sun-pulse 4s ease-in-out infinite;
}
/* Bandas horizontales del sol */
.sun::before {
content: “”;
position: absolute;
left: 5%; right: 5%;
top: 60%;
height: 4px;
background: var(–bg-0);
box-shadow:
0 14px 0 var(–bg-0),
0 28px 0 var(–bg-0),
0 44px 0 var(–bg-0),
0 64px 0 var(–bg-0);
border-radius: 2px;
}
@keyframes sun-pulse {
0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.95; }
50%      { transform: translate(-50%, -50%) scale(1.04); opacity: 1; }
}

/* === Cuadrícula del piso === */
.floor {
position: fixed;
bottom: 0;
left: 50%;
width: 300vw;
height: 60vh;
transform: translateX(-50%) perspective(500px) rotateX(65deg);
transform-origin: center top;
background-image:
linear-gradient(var(–grid-strong) 2px, transparent 2px),
linear-gradient(90deg, var(–grid-strong) 2px, transparent 2px);
background-size: 50px 50px;
animation: floor-scroll 4s linear infinite;
mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.9) 30%, rgba(0,0,0,1) 70%);
-webkit-mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.9) 30%, rgba(0,0,0,1) 70%);
z-index: 1;
}
@keyframes floor-scroll {
from { background-position: 0 0; }
to   { background-position: 0 50px; }
}

/* === Scanlines === */
.scanlines {
position: fixed; inset: 0;
background: repeating-linear-gradient(
to bottom,
rgba(255, 255, 255, 0.04) 0px,
rgba(255, 255, 255, 0.04) 1px,
transparent 1px,
transparent 3px
);
pointer-events: none;
z-index: 5;
}

/* === Ruido === */
.noise {
position: fixed; inset: 0;
pointer-events: none;
z-index: 6;
opacity: 0.08;
background-image: url(“data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='1'/></svg>”);
}

/* === Stage / contenido === */
.stage {
position: relative;
z-index: 3;
height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 24px;
text-align: center;
gap: 18px;
}

/* Tag superior */
.tag {
font-family: ‘Share Tech Mono’, monospace;
font-size: 11px;
letter-spacing: 0.4em;
color: var(–neon-cyan);
text-transform: uppercase;
padding: 8px 18px;
border: 1px solid rgba(0, 240, 255, 0.5);
background: rgba(0, 240, 255, 0.05);
box-shadow: 0 0 20px rgba(0, 240, 255, 0.15) inset, 0 0 12px rgba(0, 240, 255, 0.2);
animation: flicker 5s infinite, fade-in 1.2s ease-out 0.1s both;
}
.tag .dot {
display: inline-block;
width: 7px; height: 7px;
border-radius: 50%;
background: var(–neon-cyan);
margin-right: 10px;
box-shadow: 0 0 10px var(–neon-cyan);
animation: blink 1.4s ease-in-out infinite;
vertical-align: middle;
}

/* === τ TAU GIGANTE — color sólido + glow potente === */
.tau-wrap {
position: relative;
line-height: 0.85;
animation: fade-in 1.4s ease-out 0.3s both;
}
.tau {
font-family: ‘Orbitron’, ‘Times New Roman’, serif;
font-weight: 900;
font-size: clamp(180px, 38vw, 360px);
color: #ffffff;
line-height: 0.85;
display: block;
text-shadow:
0 0 18px rgba(0, 240, 255, 0.95),
0 0 36px rgba(0, 240, 255, 0.75),
0 0 60px rgba(138, 43, 255, 0.6),
0 0 100px rgba(255, 43, 214, 0.5);
animation: glitch-shift 7s infinite;
}

/* Capas glitch RGB */
.tau-wrap .ghost {
position: absolute;
top: 0; left: 0;
right: 0;
font-family: ‘Orbitron’, ‘Times New Roman’, serif;
font-weight: 900;
font-size: clamp(180px, 38vw, 360px);
line-height: 0.85;
pointer-events: none;
mix-blend-mode: screen;
opacity: 0.7;
}
.tau-wrap .ghost.cyan {
color: var(–neon-cyan);
transform: translate(-4px, 0);
animation: glitch-1 3.6s infinite steps(1);
}
.tau-wrap .ghost.magenta {
color: var(–neon-magenta);
transform: translate(4px, 0);
animation: glitch-2 3.6s infinite steps(1);
}

/* Título */
.title {
font-family: ‘Chakra Petch’, sans-serif;
font-weight: 700;
font-size: clamp(32px, 7vw, 72px);
letter-spacing: 0.12em;
text-transform: uppercase;
color: #f4faff;
text-shadow: 0 0 18px rgba(0, 240, 255, 0.4);
animation: fade-in 1.2s ease-out 0.6s both;
}
.title .pro {
color: var(–neon-magenta);
font-style: italic;
text-shadow:
0 0 10px rgba(255, 43, 214, 0.9),
0 0 28px rgba(255, 43, 214, 0.6);
}

/* Línea separadora */
.line {
width: clamp(160px, 32vw, 320px);
height: 1px;
background: linear-gradient(90deg, transparent, var(–neon-cyan), var(–neon-magenta), transparent);
box-shadow: 0 0 8px rgba(0, 240, 255, 0.6);
animation: fade-in 1.2s ease-out 0.9s both;
}

/* Próximamente */
.soon {
font-family: ‘Share Tech Mono’, monospace;
font-size: clamp(13px, 1.8vw, 18px);
letter-spacing: 0.6em;
color: var(–neon-cyan);
text-transform: uppercase;
padding-left: 0.6em;
text-shadow: 0 0 14px rgba(0, 240, 255, 0.8);
animation: fade-in 1.2s ease-out 1.1s both, flicker 5s infinite;
display: inline-flex;
align-items: center;
gap: 4px;
}
.soon .bracket { color: var(–neon-magenta); }
.soon .cursor {
display: inline-block;
width: 0.6em;
height: 1.1em;
background: var(–neon-cyan);
box-shadow: 0 0 10px var(–neon-cyan);
animation: blink 1s steps(1) infinite;
margin-left: 6px;
}

/* HUD esquinas */
.hud-corner {
position: fixed;
width: 26px; height: 26px;
border: 1px solid var(–neon-cyan);
z-index: 4;
opacity: 0.7;
}
.hud-corner.tl { top: 14px; left: 14px; border-right: none; border-bottom: none; }
.hud-corner.tr { top: 14px; right: 14px; border-left: none; border-bottom: none; }
.hud-corner.bl { bottom: 14px; left: 14px; border-right: none; border-top: none; }
.hud-corner.br { bottom: 14px; right: 14px; border-left: none; border-top: none; }

/* Footer */
.hud {
position: fixed;
bottom: 22px;
left: 0; right: 0;
display: flex;
justify-content: space-between;
padding: 0 30px;
font-family: ‘Share Tech Mono’, monospace;
font-size: 9px;
letter-spacing: 0.2em;
color: rgba(0, 240, 255, 0.65);
z-index: 4;
text-transform: uppercase;
}

/* === Animaciones === */
@keyframes fade-in {
from { opacity: 0; transform: translateY(12px); }
to   { opacity: 1; transform: translateY(0); }
}
@keyframes blink {
0%, 49% { opacity: 1; }
50%, 100% { opacity: 0.15; }
}
@keyframes flicker {
0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
20%, 24%, 55% { opacity: 0.55; }
}
@keyframes glitch-shift {
0%, 92%, 100% { transform: translate(0, 0); }
93% { transform: translate(-2px, 1px); }
94% { transform: translate(2px, -1px); }
95% { transform: translate(-1px, 2px); }
96% { transform: translate(1px, -2px); }
97% { transform: translate(0, 0); }
}
@keyframes glitch-1 {
0%, 100% { clip-path: inset(0 0 0 0); }
20%      { clip-path: inset(10% 0 60% 0); }
40%      { clip-path: inset(45% 0 30% 0); }
60%      { clip-path: inset(75% 0 5% 0); }
80%      { clip-path: inset(20% 0 50% 0); }
}
@keyframes glitch-2 {
0%, 100% { clip-path: inset(0 0 0 0); }
20%      { clip-path: inset(60% 0 10% 0); }
40%      { clip-path: inset(25% 0 45% 0); }
60%      { clip-path: inset(5% 0 75% 0); }
80%      { clip-path: inset(50% 0 20% 0); }
}

@media (max-width: 480px) {
.tag { font-size: 10px; letter-spacing: 0.3em; padding: 7px 14px; }
.soon { letter-spacing: 0.45em; padding-left: 0.45em; }
.hud { font-size: 8px; padding: 0 18px; }
}
</style>

</head>
<body>

  <div class="bg"></div>
  <div class="sun"></div>
  <div class="floor"></div>

  <!-- HUD esquinas -->

  <div class="hud-corner tl"></div>
  <div class="hud-corner tr"></div>
  <div class="hud-corner bl"></div>
  <div class="hud-corner br"></div>

  <main class="stage">
