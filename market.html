<style>
  :root {
    --bg: #05060a;
    --bg-2: #0d0f17;
    --border: rgba(0, 240, 255, 0.10);
    --text: #e8f6ff;
    --text-dim: #8a95a8;
    --text-faint: #5a6273;
    --green: #22d87a;
    --red: #ff4d5e;
    --cyan: #00f0ff;
    --magenta: #ff2bd6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Chakra Petch', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* Glow sutil en el fondo */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(0, 240, 255, 0.06), transparent 60%),
      radial-gradient(ellipse 60% 40% at 50% 100%, rgba(255, 43, 214, 0.04), transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ===== HEADER ===== */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 50;
    padding: 14px 16px;
    padding-top: calc(14px + env(safe-area-inset-top));
    background: rgba(5, 6, 10, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: inherit;
    min-width: 0;
  }
  .brand-mark {
    width: 36px; height: 36px;
    flex-shrink: 0;
    border-radius: 9px;
    background: linear-gradient(135deg, rgba(0,240,255,0.12), rgba(255,43,214,0.10));
    border: 1px solid rgba(0, 240, 255, 0.4);
    display: grid;
    place-items: center;
    color: #fff;
    font-family: 'Orbitron', serif;
    font-weight: 900;
    font-size: 20px;
    line-height: 1;
    box-shadow:
      0 0 14px rgba(0, 240, 255, 0.3),
      0 0 24px rgba(255, 43, 214, 0.15);
    text-shadow: 0 0 8px rgba(0, 240, 255, 0.7);
  }
  .brand-text {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
    min-width: 0;
  }
  .brand-title {
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.06em;
    color: #f4faff;
    white-space: nowrap;
  }
  .brand-title .pro {
    color: var(--magenta);
    font-style: italic;
    margin-left: 3px;
    text-shadow: 0 0 8px rgba(255, 43, 214, 0.6);
  }
  .brand-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--text-faint);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* TAO ticker compacto */
  .tao-info {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    line-height: 1.1;
    flex-shrink: 0;
    font-family: 'Share Tech Mono', monospace;
    text-decoration: none;
    color: inherit;
    padding: 4px 8px;
    border-radius: 6px;
    transition: background 0.15s, transform 0.15s;
    cursor: pointer;
  }
  .tao-info:hover {
    background: rgba(0, 240, 255, 0.06);
  }
  .tao-info:active {
    transform: scale(0.97);
  }
  .tao-label {
    font-size: 9px;
    color: var(--text-faint);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .tao-price {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-top: 2px;
  }
  .tao-change {
    font-size: 11px;
    margin-top: 1px;
  }
  .tao-change.pos { color: var(--green); }
  .tao-change.neg { color: var(--red); }

  /* Botón Aprender en header */
  .learn-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--cyan);
    text-decoration: none;
    padding: 6px 12px;
    border: 1px solid rgba(0, 240, 255, 0.3);
    border-radius: 6px;
    transition: all 0.15s;
    flex-shrink: 0;
    text-shadow: 0 0 6px rgba(0, 240, 255, 0.4);
  }
  .learn-btn:hover {
    border-color: var(--cyan);
    background: rgba(0, 240, 255, 0.06);
    box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
  }
  @media (max-width: 480px) {
    .learn-btn { font-size: 10px; padding: 5px 8px; letter-spacing: 0.12em; }
  }

  /* ===== STATS BAR ===== */
  .stats-bar {
    display: flex;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--bg-2);
    border-bottom: 1px solid var(--border);
    font-family: 'Share Tech Mono', monospace;
    gap: 12px;
  }
  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }
  .stat-label {
    font-size: 9px;
    color: var(--text-faint);
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .stat-value {
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
    white-space: nowrap;
  }

  /* ===== CONTROLS BAR ===== */
  .controls {
    position: sticky;
    top: 0;
    z-index: 40;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: rgba(13, 15, 23, 0.95);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
  }

  .toggle {
    display: inline-flex;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 2px;
  }
  .toggle button {
    background: transparent;
    border: none;
    color: var(--text-dim);
    padding: 6px 14px;
    border-radius: 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    min-width: 36px;
  }
  .toggle button.active {
    background: rgba(0, 240, 255, 0.1);
    color: var(--cyan);
    text-shadow: 0 0 6px rgba(0, 240, 255, 0.5);
  }
  /* En el toggle de timeframe, los botones son más estrechos */
  #tf-toggle button {
    padding: 6px 10px;
    min-width: 32px;
    font-size: 12px;
  }

  .search {
    flex: 1;
    position: relative;
  }
  .search input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Chakra Petch', sans-serif;
    font-size: 13px;
    padding: 8px 12px 8px 32px;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search input::placeholder { color: var(--text-faint); }
  .search input:focus { border-color: var(--cyan); }
  .search::before {
    content: "⌕";
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--cyan);
    font-size: 14px;
    opacity: 0.7;
  }

  /* ===== LIST (tabla con scroll horizontal en móvil) ===== */
  .list-wrap {
    position: relative;
    z-index: 1;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .list {
    min-width: 600px; /* fuerza scroll en móvil */
  }

  /* 6 columnas: # | Subnet | Precio | Mcap | Volumen | Var% */
  .list-row, .list-header {
    display: grid;
    grid-template-columns:
      44px              /* # */
      minmax(140px, 1.4fr) /* nombre */
      90px              /* precio */
      110px             /* mcap */
      100px             /* volumen */
      80px;             /* var */
    gap: 0;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }

  .list-header {
    background: rgba(13, 15, 23, 0.6);
    padding-top: 10px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border-2);
  }
  .list-header > div {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.16em;
    color: var(--text-faint);
    text-transform: uppercase;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    transition: color 0.15s;
    white-space: nowrap;
  }
  .list-header > div:hover {
    color: var(--text-muted);
  }
  .list-header > div.active {
    color: var(--cyan);
    text-shadow: 0 0 6px rgba(0, 240, 255, 0.5);
  }
  .list-header .sort-arrow {
    margin-left: 4px;
    font-size: 10px;
    opacity: 0.35;
    transition: opacity 0.15s;
  }
  .list-header > div:hover .sort-arrow {
    opacity: 0.7;
  }
  .list-header > div.active .sort-arrow {
    opacity: 1;
    font-size: 11px;
  }
  .list-header .num,
  .list-row .num {
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .list-header .num-center,
  .list-row .num-center {
    text-align: center;
    font-variant-numeric: tabular-nums;
  }

  .list-row {
    cursor: pointer;
    transition: background 0.1s;
  }
  .list-row:active { background: rgba(0, 240, 255, 0.04); }
  @media (hover: hover) {
    .list-row:hover { background: rgba(0, 240, 255, 0.04); }
  }

  .rank {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--text-faint);
    text-align: center;
  }
  .subnet-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }
  .subnet-symbol {
    font-family: 'Chakra Petch', sans-serif;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.01em;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .subnet-meta {
    font-family: 'Orbitron', sans-serif;
    font-weight: 600;
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .price, .vol, .mcap {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--text);
    text-align: right;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    padding-right: 8px;
  }
  .vol, .mcap { color: var(--text-muted); }
  .change {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    text-align: right;
    font-variant-numeric: tabular-nums;
    font-weight: 500;
    white-space: nowrap;
    padding-right: 8px;
  }
  .change.pos { color: var(--green); }
  .change.neg { color: var(--red); }
  .change.zero { color: var(--text-dim); }

  /* Sticky en móvil: # y nombre se quedan fijos al scrollear horizontal */
  @media (max-width: 760px) {
    .list-row .rank, .list-header .col-rank {
      position: sticky;
      left: 0;
      background: var(--bg);
      z-index: 2;
    }
    .list-row .subnet-info, .list-header .col-name {
      position: sticky;
      left: 44px;
      background: var(--bg);
      z-index: 2;
    }
    .list-header .col-rank, .list-header .col-name {
      background: rgba(13, 15, 23, 0.98);
    }
    .list-row:hover .rank, .list-row:hover .subnet-info,
    .list-row:active .rank, .list-row:active .subnet-info {
      background: #0e1119;
    }
  }

  /* Estado de carga / vacío */
  .empty-state {
    padding: 40px 16px;
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    color: var(--text-faint);
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .loading-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 12px var(--cyan);
    margin-right: 8px;
    animation: pulse 1.4s ease-in-out infinite;
    vertical-align: middle;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Footer */
  .footer {
    padding: 20px 16px calc(20px + env(safe-area-inset-bottom));
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--text-faint);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .footer .live-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan);
    margin-right: 6px;
    animation: pulse 1.6s ease-in-out infinite;
    vertical-align: middle;
  }
  .footer a {
    color: var(--cyan);
    text-decoration: none;
  }

  /* Pequeñas pantallas */
  @media (max-width: 380px) {
    .topbar { padding: 12px 12px; }
    .stats-bar { padding: 10px 12px; }
    .controls { padding: 10px 12px; }
    .list-row { padding: 12px 12px; gap: 8px; }
    .brand-title { font-size: 14px; }
    .tao-price { font-size: 13px; }
    .stat-value { font-size: 12px; }
    .toggle button { padding: 6px 10px; font-size: 12px; min-width: 30px; }
    #tf-toggle button { padding: 6px 7px; font-size: 11px; min-width: 26px; }
  }
</style>

</head>

  52: { symbol: 'DOJO',     name: 'Dojo' },
  53: { symbol: 'EF',       name: 'Efficient Frontier' },
  54: { symbol: 'WGENIE',   name: 'WebGenieAI' },
  55: { symbol: 'PRECOG',   name: 'Precog' },
  56: { symbol: 'GRAD',     name: 'Gradients' },
  57: { symbol: 'GAIA',     name: 'Gaia' },
  58: { symbol: 'SPEECH',   name: 'Dippy Speech' },
  59: { symbol: 'ARENA',    name: 'Agent Arena by Masa' },
  60: { symbol: 'BITSEC',   name: 'Bitsec' },
  61: { symbol: 'RED',      name: 'Red Team' },
  62: { symbol: 'AGT',      name: 'AgenTao' },
  64: { symbol: 'CHUTES',   name: 'Chutes' },
  65: { symbol: 'TPN',      name: 'TAO Private Network' },
  66: { symbol: 'FAKEN',    name: 'FakeNews' },
  68: { symbol: 'NOVA',     name: 'Nova' },
};

/* =========================================================================
   ESTADO
   ========================================================================= */
const STATE = {
  data: [],
  currency: 'USD',
  search: '',
  taoUsd: 0,
  taoChange: 0,
  sortBy: 'id',           // por defecto: ordenar por número de subnet ascendente
  sortDir: 'asc',
  timeframe: 'change24h', // 1h | 24h | 7d | 30d
};

/* =========================================================================
   FORMATTERS
   ========================================================================= */
function fmtPriceUSD(taoPrice) {
  const usd = taoPrice * STATE.taoUsd;
  if (usd === 0) return '—';
  if (usd < 0.01) return '$' + usd.toFixed(5);
  if (usd < 1) return '$' + usd.toFixed(3);
  if (usd < 100) return '$' + usd.toFixed(2);
  return '$' + usd.toFixed(1);
}
function fmtPriceTAO(p) {
  if (p === 0) return '—';
  if (p < 0.001) return p.toExponential(2) + 'τ';
  if (p < 1) return p.toFixed(4) + 'τ';
  return p.toFixed(3) + 'τ';
}
function fmtPrice(p) {
  return STATE.currency === 'USD' ? fmtPriceUSD(p) : fmtPriceTAO(p);
}

function fmtMoneyUSD(taoVal) {
  const usd = taoVal * STATE.taoUsd;
  if (usd >= 1e9) return '$' + (usd / 1e9).toFixed(2) + 'B';
  if (usd >= 1e6) return '$' + (usd / 1e6).toFixed(2) + 'M';
  if (usd >= 1e3) return '$' + (usd / 1e3).toFixed(1) + 'K';
  return '$' + usd.toFixed(0);
}
function fmtMoneyTAO(v) {
  if (v >= 1e6) return (v / 1e6).toFixed(2) + 'Mτ';
  if (v >= 1e3) return (v / 1e3).toFixed(1) + 'Kτ';
  return v.toFixed(0) + 'τ';
}
function fmtMoney(v) {
  return STATE.currency === 'USD' ? fmtMoneyUSD(v) : fmtMoneyTAO(v);
}

function fmtPct(v) {
  if (v === 0 || v === null || v === undefined || isNaN(v)) return '0.00%';
  const sign = v >= 0 ? '+' : '';
  return sign + v.toFixed(2) + '%';
}

function pctClass(v) {
  if (!v || isNaN(v)) return 'zero';
  if (Math.abs(v) < 0.01) return 'zero';
  return v >= 0 ? 'pos' : 'neg';
}

/* =========================================================================
   MAPEO TAOSTATS → MODELO INTERNO
   ========================================================================= */
function mapSubnet(raw) {
  const id = raw.netuid;
  const def = SUBNET_DEFS[id];

  // Símbolo: priorizar nuestro diccionario sobre símbolos unicode raros (ش, ת...)
  let symbol;
  if (def && def.symbol) {
    symbol = def.symbol;
  } else if (raw.symbol && /^[A-Za-z0-9]{2,8}$/.test(raw.symbol.trim())) {
    symbol = raw.symbol.trim().toUpperCase();
  } else {
    symbol = `SN${id}`;
  }

  // Nombre
  let name;
  if (raw.name && raw.name !== 'Unknown' && raw.name.trim()) {
    name = raw.name.trim();
  } else if (def && def.name) {
    name = def.name;
  } else {
    name = `Subnet ${id}`;
  }

  return {
    id,
    symbol,
    name,
    price: parseFloat(raw.price) || 0,
    marketCap: (parseFloat(raw.market_cap) || 0) / RAO,
    volume: (parseFloat(raw.tao_volume_24_hr) || 0) / RAO,
    change1h:  parseFloat(raw.price_change_1_hour)  || 0,
    change24h: parseFloat(raw.price_change_1_day)   || 0,
    change7d:  parseFloat(raw.price_change_1_week)  || 0,
    change30d: parseFloat(raw.price_change_1_month) || 0,
  };
}

/* =========================================================================
   RENDERIZADO
   ========================================================================= */
function renderHeader() {
  const priceEl = document.getElementById('tao-price');
  const changeEl = document.getElementById('tao-change');

  if (STATE.taoUsd > 0) {
    priceEl.textContent = STATE.currency === 'USD'
      ? '$' + STATE.taoUsd.toFixed(2)
      : '1.00 τ';
    changeEl.textContent = fmtPct(STATE.taoChange);
    changeEl.className = 'tao-change ' + pctClass(STATE.taoChange);
  }
}

function renderStats(filteredData) {
  document.getElementById('stat-count').textContent = filteredData.length;

  const totalMcap = filteredData.reduce((s, d) => s + d.marketCap, 0);
  const totalVol = filteredData.reduce((s, d) => s + d.volume, 0);

  document.getElementById('stat-mcap').textContent = fmtMoney(totalMcap);
  document.getElementById('stat-vol').textContent = fmtMoney(totalVol);
}

function updateHeaderArrows() {
  const headers = document.querySelectorAll('.list-header > div');
  headers.forEach(h => {
    const arrow = h.querySelector('.sort-arrow');
    if (!arrow) return;
    if (h.dataset.sort === STATE.sortBy) {
      h.classList.add('active');
      arrow.textContent = STATE.sortDir === 'asc' ? '↑' : '↓';
    } else {
      h.classList.remove('active');
      arrow.textContent = '⇅';
    }
  });

  // Actualizar el label de la columna de variación según timeframe activo
  const tfLabels = {
    change1h:  '1h',
    change24h: '24h',
    change7d:  '7d',
    change30d: '30d',
  };
  const hdrChange = document.getElementById('hdr-change');
  if (hdrChange) {
    const label = tfLabels[STATE.timeframe] || '24h';
    const isActive = STATE.sortBy === 'change';
    const arrow = isActive ? (STATE.sortDir === 'asc' ? '↑' : '↓') : '⇅';
    hdrChange.innerHTML = label + '<span class="sort-arrow">' + arrow + '</span>';
    if (isActive) hdrChange.classList.add('active');
    else hdrChange.classList.remove('active');
  }
}

function renderList() {
  const rowsEl = document.getElementById('rows-container');

  // Filtrar por búsqueda
  const q = STATE.search.trim().toLowerCase();
  let filtered = STATE.data;
  if (q) {
    filtered = STATE.data.filter(d =>
      d.symbol.toLowerCase().includes(q) ||
      d.name.toLowerCase().includes(q) ||
      String(d.id) === q
    );
  }

  // Resolver clave de ordenación: 'change' = la del timeframe activo
  const sortKey = STATE.sortBy === 'change' ? STATE.timeframe : STATE.sortBy;
  const dir = STATE.sortDir === 'asc' ? 1 : -1;

  filtered = [...filtered].sort((a, b) => {
    let av = a[sortKey], bv = b[sortKey];
    if (sortKey === 'name') {
      av = (av || '').toLowerCase();
      bv = (bv || '').toLowerCase();
      if (av < bv) return -1 * dir;
      if (av > bv) return  1 * dir;
      return 0;
    }
    av = Number(av) || 0;
    bv = Number(bv) || 0;
    return (av - bv) * dir;
  });

  renderStats(filtered);
  updateHeaderArrows();

  if (filtered.length === 0) {
    rowsEl.innerHTML = '<div class="empty-state">Sin resultados</div>';
    return;
  }

  // Construir HTML — orden: # | Subnet | Precio | Mcap | Volumen | Var%
  const tfKey = STATE.timeframe;
  const html = filtered.map(d => {
    const change = d[tfKey] || 0;
    return `
    <div class="list-row" data-id="${d.id}">
      <div class="rank">${d.id}</div>
      <div class="subnet-info">
        <span class="subnet-symbol">${escapeHtml(d.name)}</span>
        <span class="subnet-meta">${escapeHtml(d.symbol)} · SN${d.id}</span>
      </div>
      <div class="price">${fmtPrice(d.price)}</div>
      <div class="mcap">${fmtMoney(d.marketCap)}</div>
      <div class="vol">${fmtMoney(d.volume)}</div>
      <div class="change ${pctClass(change)}">${fmtPct(change)}</div>
    </div>
    `;
  }).join('');

  rowsEl.innerHTML = html;
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* =========================================================================
   FETCH DEL PROXY
   ========================================================================= */
async function loadData() {
  try {
    const [priceRes, p1Res, p2Res] = await Promise.all([
      fetch(`${API_BASE}/api/price/latest/v1?asset=tao`),
      fetch(`${API_BASE}/api/dtao/pool/latest/v1?page=1&limit=100`),
      fetch(`${API_BASE}/api/dtao/pool/latest/v1?page=2&limit=100`),
    ]);

    if (!priceRes.ok || !p1Res.ok || !p2Res.ok) {
      throw new Error(`HTTP error: ${priceRes.status}/${p1Res.status}/${p2Res.status}`);
    }

    const priceJson = await priceRes.json();
    const p1Json = await p1Res.json();
    const p2Json = await p2Res.json();

    // TAO
    if (priceJson?.data?.[0]) {
      STATE.taoUsd = parseFloat(priceJson.data[0].price) || 0;
      STATE.taoChange = parseFloat(priceJson.data[0].percent_change_24h) || 0;
    }

    // Subnets
    const raw = [...(p1Json?.data || []), ...(p2Json?.data || [])];
    if (raw.length === 0) {
      throw new Error('proxy devolvió 0 subnets');
    }

    STATE.data = raw
      .filter(s => s.netuid > 0)
      .map(mapSubnet);

    renderHeader();
    renderList();

    console.log(`[bittensor-pro] ${STATE.data.length} subnets cargadas, TAO=$${STATE.taoUsd.toFixed(2)}`);
  } catch (err) {
    console.error('[bittensor-pro] error cargando datos:', err);
    if (STATE.data.length === 0) {
      document.getElementById('list').innerHTML =
        '<div class="empty-state">Error cargando datos. Reintentando…</div>';
    }
  }
}

/* =========================================================================
   EVENTOS
   ========================================================================= */
document.getElementById('cur-toggle').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  document.querySelectorAll('#cur-toggle button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  STATE.currency = btn.dataset.cur;
  renderHeader();
  renderList();
});

document.getElementById('tf-toggle').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  document.querySelectorAll('#tf-toggle button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  STATE.timeframe = btn.dataset.tf;
  renderList();
});

document.getElementById('search').addEventListener('input', e => {
  STATE.search = e.target.value;
  renderList();
});

// Click en cabecera → ordenar
document.querySelector('.list-header').addEventListener('click', e => {
  const col = e.target.closest('[data-sort]');
  if (!col) return;
  const key = col.dataset.sort;
  if (STATE.sortBy === key) {
    // Toggle dirección
    STATE.sortDir = STATE.sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    STATE.sortBy = key;
    // Para cambios numéricos (precio, mcap, vol, %) por defecto descendente
    // Para id y nombre: ascendente
    STATE.sortDir = (key === 'id' || key === 'name') ? 'asc' : 'desc';
  }
  renderList();
});

// Click en una fila → abrir página detalle de la subnet
document.getElementById('rows-container').addEventListener('click', e => {
  const row = e.target.closest('.list-row');
  if (!row) return;
  const id = row.dataset.id;
  if (id) {
    window.location.href = `subnet.html?id=${id}`;
  }
});

/* =========================================================================
   BOOT
   ========================================================================= */
loadData();
setInterval(loadData, 60_000);  // refresh cada minuto
</script>
